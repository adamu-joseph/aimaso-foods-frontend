name: CI Pipeline

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Dependencies
        run: npm ci

      # Fast checks first
      - name: Format Check
        run: npm run format:check

      - name: Lint Code
        run: npm run lint

      # Functional validation
      - name: Run Tests
        run: npm run test

      # Production build verification
      - name: Build Project
        run: npm run build

      # Non-blocking security report
      - name: Security Audit
        run: npm audit --audit-level=high
